# Pizzini relay onion service.
#
# Tor accepts the operator's pre-generated vanity v3 key files at
# /var/lib/tor/pizzini/ (hs_ed25519_secret_key + hs_ed25519_public_key,
# owned debian-tor:debian-tor 0600) and exposes
# pizzini2rblrsw....onion:7777 — forwarding to the relay's loopback
# listener inside the same box.
#
# No HiddenServiceAuthorizeClient: this is a public messenger relay,
# anyone with the address can connect. The relay's own protocol does
# all peer authn (HELLO signed by XEd25519 + first-contact PoW).
#
# HiddenServiceVersion 3 is the only supported version on Tor >=
# 0.4.6; the explicit line is belt-and-braces against future Tor
# defaults changing. Vanguards-lite is on by default in 0.4.7+.

HiddenServiceDir /var/lib/tor/pizzini/
HiddenServicePort 7777 127.0.0.1:7777
HiddenServiceVersion 3
